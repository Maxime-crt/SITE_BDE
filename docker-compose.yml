services:
  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: postgres-site-bde
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: site_bde_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - site-bde-network

  # Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: site-bde-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres-site-bde:5432/site_bde_dev?schema=public
      DB_HOST: postgres-site-bde
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      AUTO_ADMIN_EMAILS: ${AUTO_ADMIN_EMAILS:-}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    volumes:
      - uploads_data:/app/backend/uploads
    networks:
      - site-bde-network

networks:
  site-bde-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
