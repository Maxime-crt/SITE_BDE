services:
  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: postgres-site-bde
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: site_bde_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - site-bde-network

  # Application dev (Backend + Frontend) - hot-reload via volumes
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: site-bde-app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres-site-bde:5432/site_bde_dev?schema=public
      DB_HOST: postgres-site-bde
      DB_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      AUTO_ADMIN_EMAILS: ${AUTO_ADMIN_EMAILS:-}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/prisma:/app/backend/prisma
      - ./backend/tsconfig.json:/app/backend/tsconfig.json
      - ./backend/package.json:/app/backend/package.json
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tailwind.config.js:/app/frontend/tailwind.config.js
      - ./frontend/postcss.config.js:/app/frontend/postcss.config.js
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      - ./scripts:/app/scripts
      - uploads_data:/app/backend/uploads
    networks:
      - site-bde-network
    command: >
      sh -c "
        cd /app/backend && npx prisma migrate deploy &&
        cd /app && npm run dev:backend &
        cd /app && npm run dev:frontend &
        sh /app/scripts/watch-frontend.sh &
        wait
      "

networks:
  site-bde-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
